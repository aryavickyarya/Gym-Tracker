<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gym Tracker 30 Days</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gym Tracker">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2964/2964514.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f12;
            --card: #1c1c21;
            --primary: #ff3b3b;
            --primary-dark: #cc2e2e;
            --secondary: #2c2c34;
            --accent: #00f2ea;
            --success: #00f5a0;
            --text-high: #ffffff;
            --text-med: #a1a1aa;
            --text-low: #52525b;
            --safe-area-top: env(safe-area-inset-top, 0px);
            --safe-area-bottom: env(safe-area-inset-bottom, 20px);
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }


        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }


        body {
            background-color: var(--bg);
            color: var(--text-high);
            line-height: 1.5;
            padding-top: var(--safe-area-top);
            padding-bottom: calc(85px + var(--safe-area-bottom));
            user-select: none;
            overflow-x: hidden;
            min-height: 100vh;
        }


        /* --- UI Components (Consistent with Pro Version) --- */
        .header {
            padding: 30px 20px 20px;
            background: linear-gradient(180deg, rgba(255, 59, 59, 0.1) 0%, rgba(15, 15, 18, 0) 100%);
        }


        .header h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 32px;
            letter-spacing: -0.5px;
            color: var(--primary);
            text-transform: uppercase;
        }


        .container { padding: 0 20px; max-width: 600px; margin: 0 auto; }


        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s ease;
        }


        .card:active { transform: scale(0.99); }


        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-item { background: var(--secondary); padding: 16px; border-radius: 20px; text-align: left; }
        .stat-val { display: block; font-size: 24px; font-weight: 800; color: var(--text-high); margin-bottom: 4px; }
        .stat-label { font-size: 11px; color: var(--text-med); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }


        .progress-bar-wrapper { background: var(--secondary); height: 12px; border-radius: 10px; margin: 15px 0 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #ff7b7b); width: 0%; border-radius: 10px; transition: width 1s ease; }


        .btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 16px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-outline { background: transparent; border: 2px solid var(--secondary); color: var(--text-high); }
        
        input, select, textarea { width: 100%; padding: 14px 16px; background: var(--secondary); border: 1px solid transparent; border-radius: 14px; color: var(--text-high); font-size: 15px; margin-bottom: 15px; }


        .nav-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(28, 28, 33, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 10px calc(12px + var(--safe-area-bottom));
            border-top: 1px solid rgba(255,255,255,0.05);
            z-index: 1000;
        }


        .nav-btn { background: none; border: none; color: var(--text-low); display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 700; gap: 4px; flex: 1; }
        .nav-btn.active { color: var(--primary); }
        .nav-btn svg { width: 22px; height: 22px; }


        .view-section { display: none; animation: slideUp 0.4s ease-out; }
        .view-section.active { display: block; }


        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }


        .grid-30 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .day-circle { aspect-ratio: 1; background: var(--secondary); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: var(--text-med); }
        .day-circle.completed { background: var(--success); color: var(--bg); }
        .day-circle.current { background: var(--primary); color: white; box-shadow: 0 0 15px rgba(255, 59, 59, 0.4); }


        .toast { position: fixed; top: 50px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #fff; color: #000; padding: 12px 24px; border-radius: 50px; font-weight: 700; z-index: 2000; transition: transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .toast.show { transform: translateX(-50%) translateY(0); }
        
        .chart-container { width: 100%; height: 200px; margin-top: 10px; }
    </style>
</head>
<body>


    <div id="toast" class="toast">✓ Tersimpan</div>


    <div class="header">
        <h1 id="app-title">Gym Tracker</h1>
        <p style="font-size: 12px; color: var(--text-med);">PWA Version - Build 2.0</p>
    </div>


    <div class="container">
        
        <!-- DASHBOARD -->
        <section id="view-dashboard" class="view-section active">
            <div class="card" style="background: linear-gradient(135deg, #1c1c21 0%, #25252d 100%);">
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <div>
                        <p style="font-size: 11px; color: var(--text-med); font-weight: 700; text-transform: uppercase;">Current Progress</p>
                        <h2 id="dash-weight-range" style="font-size: 24px; font-weight: 800; color: var(--primary);">62 kg → 64 kg</h2>
                    </div>
                    <div id="dash-day-badge" style="background: var(--primary); padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 800;">DAY 1</div>
                </div>
                <div class="progress-bar-wrapper">
                    <div id="dash-main-progress" class="progress-fill"></div>
                </div>
                <p id="dash-progress-label" style="font-size: 11px; font-weight: 700; color: var(--text-med);">0% Selesai</p>
            </div>


            <div class="stats-grid">
                <div class="stat-item"><span id="stat-workouts" class="stat-val">0</span><span class="stat-label">Workout</span></div>
                <div class="stat-item"><span id="stat-current-weight" class="stat-val">--</span><span class="stat-label">Weight</span></div>
            </div>


            <div id="dash-today-schedule" class="card" style="border-left: 4px solid var(--primary);">
                <!-- Today schedule injected here -->
            </div>
        </section>


        <!-- LOG WORKOUT -->
        <section id="view-workout" class="view-section">
            <div class="card">
                <h3>Log Latihan</h3>
                <input type="date" id="input-wo-date">
                <select id="input-wo-type">
                    <option value="Push">Push</option>
                    <option value="Pull">Pull</option>
                    <option value="Legs">Legs</option>
                    <option value="Rest">Rest</option>
                </select>
                <input type="number" id="input-wo-duration" placeholder="Durasi (Menit)">
                <button class="btn" onclick="saveWorkout()">Simpan Latihan</button>
            </div>
            <div id="history-list"></div>
        </section>


        <!-- PROGRESS CHART -->
        <section id="view-progress" class="view-section">
            <div class="card">
                <h3>Update Berat Badan</h3>
                <div style="display: grid; grid-template-columns: 1fr auto; gap: 10px;">
                    <input type="number" step="0.1" id="input-bw-val" placeholder="Kg">
                    <button class="btn" style="width: 50px;" onclick="saveBodyweight()">+</button>
                </div>
            </div>
            <div class="card">
                <canvas id="chart-bw" class="chart-container"></canvas>
            </div>
        </section>


        <!-- 30 DAY PLAN -->
        <section id="view-plan" class="view-section">
            <div class="card">
                <div class="grid-30" id="plan-grid"></div>
            </div>
        </section>


        <!-- SETTINGS -->
        <section id="view-settings" class="view-section">
            <div class="card">
                <h3>Pengaturan</h3>
                <label style="font-size: 11px; font-weight: 700; color: var(--text-med);">Target Berat (Kg)</label>
                <input type="number" id="set-target-w">
                <button class="btn" onclick="updateProfile()">Simpan Perubahan</button>
                <button class="btn btn-outline" style="margin-top: 10px;" onclick="resetApp()">Reset Semua Data</button>
            </div>
        </section>


    </div>


    <nav class="nav-bar">
        <button class="nav-btn active" onclick="switchTab('dashboard')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>Home</button>
        <button class="nav-btn" onclick="switchTab('workout')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20v-6M9 20v-10M15 20v-2M3 20h18"></path></svg>Log</button>
        <button class="nav-btn" onclick="switchTab('progress')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>Chart</button>
        <button class="nav-btn" onclick="switchTab('plan')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"></rect><path d="M3 10h18"></path></svg>30D</button>
        <button class="nav-btn" onclick="switchTab('settings')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>
    </nav>


    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(() => console.log('Service Worker Registered'))
                .catch(err => console.error('SW Registration Failed', err));
        }


        // --- DATA LOGIC ---
        const DB_KEY = 'gym_tracker_pwa_db';
        let appData = JSON.parse(localStorage.getItem(DB_KEY)) || {
            profile: { name: 'User', startWeight: 62, targetWeight: 64, startDate: new Date().toISOString().split('T')[0] },
            workouts: [],
            bodyweight: []
        };


        function save() {
            localStorage.setItem(DB_KEY, JSON.stringify(appData));
            updateDashboard();
        }


        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }


        function switchTab(id) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
            if(id === 'plan') renderPlan();
            if(id === 'progress') drawChart();
        }


        function updateDashboard() {
            const p = appData.profile;
            const diffDays = Math.ceil((new Date() - new Date(p.startDate)) / (1000 * 3600 * 24));
            const dayNum = Math.max(1, Math.min(30, diffDays));
            
            document.getElementById('dash-day-badge').innerText = `DAY ${dayNum}`;
            document.getElementById('dash-weight-range').innerText = `${p.startWeight}kg → ${p.targetWeight}kg`;
            
            const progress = (dayNum / 30) * 100;
            document.getElementById('dash-main-progress').style.width = progress + '%';
            document.getElementById('dash-progress-label').innerText = `${Math.round(progress)}% Selesai`;
            
            document.getElementById('stat-workouts').innerText = appData.workouts.length;
            const latestW = appData.bodyweight.length ? appData.bodyweight[appData.bodyweight.length-1].val : p.startWeight;
            document.getElementById('stat-current-weight').innerText = latestW + ' kg';


            const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const schedules = ['Rest Day', 'Push Focus', 'Pull Focus', 'Active Rest', 'Legs Power', 'Cardio', 'Upper Body'];
            document.getElementById('dash-today-schedule').innerHTML = `
                <p style="font-size: 10px; font-weight: 800; color: var(--text-med);">${days[new Date().getDay()].toUpperCase()}</p>
                <h4 style="margin: 5px 0;">${schedules[new Date().getDay()]}</h4>
            `;
        }


        function saveWorkout() {
            const date = document.getElementById('input-wo-date').value;
            const type = document.getElementById('input-wo-type').value;
            const dur = document.getElementById('input-wo-duration').value;
            if(!date || !dur) return showToast('Lengkapi data!');
            appData.workouts.push({ date, type, duration: dur });
            save();
            showToast('Latihan disimpan');
            renderHistory();
        }


        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = appData.workouts.slice(-3).reverse().map(w => `
                <div class="card" style="padding: 15px;">
                    <div style="display: flex; justify-content: space-between;"><b>${w.type}</b> <small>${w.date}</small></div>
                    <div style="font-size: 13px; color: var(--text-med);">${w.duration} menit latihan</div>
                </div>
            `).join('');
        }


        function saveBodyweight() {
            const val = parseFloat(document.getElementById('input-bw-val').value);
            if(!val) return;
            appData.bodyweight.push({ date: new Date().toISOString().split('T')[0], val });
            save();
            showToast('Berat badan diupdate');
            drawChart();
        }


        function renderPlan() {
            const grid = document.getElementById('plan-grid');
            grid.innerHTML = '';
            for(let i=1; i<=30; i++) {
                const day = document.createElement('div');
                day.className = 'day-circle' + (i === 1 ? ' current' : '');
                day.innerText = i;
                grid.appendChild(day);
            }
        }


        function updateProfile() {
            const target = document.getElementById('set-target-w').value;
            if(target) appData.profile.targetWeight = target;
            save();
            showToast('Profil diupdate');
        }


        function drawChart() {
            const canvas = document.getElementById('chart-bw');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const data = appData.bodyweight.slice(-7);
            if(data.length < 2) return;
            
            ctx.strokeStyle = '#ff3b3b';
            ctx.lineWidth = 3;
            ctx.beginPath();
            const min = Math.min(...data.map(d=>d.val)) - 1;
            const range = (Math.max(...data.map(d=>d.val)) + 1) - min;
            
            data.forEach((d, i) => {
                const x = (i / (data.length - 1)) * canvas.width;
                const y = canvas.height - ((d.val - min) / range * canvas.height);
                if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            });
            ctx.stroke();
        }


        function resetApp() {
            if(confirm('Hapus semua data?')) {
                localStorage.removeItem(DB_KEY);
                location.reload();
            }
        }


        window.onload = () => {
            document.getElementById('input-wo-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('set-target-w').value = appData.profile.targetWeight;
            updateDashboard();
            renderHistory();
        };
    </script>
</body>
</html>
